services:
  dns-proxy:
    build: .
    image: dns-proxy:latest
    container_name: dns-proxy
    restart: unless-stopped

    # Run as root only for binding port 53 (privileged ports < 1024)
    # The app itself drops to the proxy user after startup via the binary
    user: root

    network_mode: host
      # Must use host networking so DNS port 53 is
      # reachable from other devices on your LAN,
      # and so LOCAL_IP auto-detection works correctly.

    environment:
      - LOCAL_IP=${LOCAL_IP} # Set in .env  e.g. LOCAL_IP=192.168.1.10
      - TZ=America/Toronto

    volumes:
      - ./blocklist.txt:/app/blocklist.txt:ro # hot-reload: restart container after edits
      - certs:/app/certs # persists ca.crt/ca.key across restarts

    # Healthcheck: verify DNS is responding
    healthcheck:
      test: [ "CMD-SHELL", "nc -zuw1 127.0.0.1 53 && nc -zw1 127.0.0.1 8080" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

volumes:
  certs:
    driver: local
